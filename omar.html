<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#080810"/>
<title>Omar — QR Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080810;--surface:#0f0f1a;--border:#1e1e30;
  --gold:#c8a96e;--gold2:#e8c97e;
  --text:#eee8df;--muted:#5a5570;
  --serif:'Playfair Display',serif;--mono:'DM Mono',monospace;
}
body{
  background:var(--bg);color:var(--text);font-family:var(--mono);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:28px 16px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
}
.wrap{position:relative;z-index:1;width:100%;max-width:380px;}
.panel{
  background:var(--surface);border:1px solid var(--border);
  padding:36px 28px 28px;position:relative;
  animation:rise .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.corner{position:absolute;width:10px;height:10px;}
.corner.tl{top:-1px;left:-1px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}
.corner.tr{top:-1px;right:-1px;border-top:1.5px solid var(--gold);border-right:1.5px solid var(--gold);}
.corner.bl{bottom:-1px;left:-1px;border-bottom:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}
.corner.br{bottom:-1px;right:-1px;border-bottom:1.5px solid var(--gold);border-right:1.5px solid var(--gold);}
.eyebrow{font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.name{font-family:var(--serif);font-size:clamp(22px,6vw,28px);font-weight:700;line-height:1.1;margin-bottom:3px;}
.role{font-size:9px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
.org{font-size:10px;color:var(--muted);margin-bottom:24px;}
.divider{height:1px;background:linear-gradient(90deg,var(--gold) 0%,var(--border) 55%);margin-bottom:24px;opacity:.35;}
.qr-wrap{text-align:center;margin-bottom:20px;}
.qr-box{display:inline-block;padding:14px;background:#fff;margin-bottom:12px;}
.qr-hint{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;}
.btn-download{
  display:inline-block;padding:11px 28px;background:var(--gold);color:#080810;
  border:none;cursor:pointer;font-family:var(--serif);
  font-size:13px;font-weight:700;letter-spacing:.08em;
  transition:background .2s;position:relative;overflow:hidden;
}
.btn-download::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 55%);pointer-events:none;}
.btn-download:hover{background:var(--gold2);}
.url-row{
  margin-top:20px;padding-top:16px;border-top:1px solid var(--border);
  font-size:8px;color:var(--muted);letter-spacing:.1em;word-break:break-all;line-height:1.8;
}
.url-row span{color:#3a3660;}
.panel-footer{
  margin-top:20px;padding-top:14px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.footer-tag{font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;}
.footer-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:.4;}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="eyebrow">── Contact QR Code</div>
    <div class="name">Omar Manar Alkassmy</div>
    <div class="role">Strategic Investment Lead</div>
    <div class="org">Syrian Saudi Business Council</div>
    <div class="divider"></div>

    <div class="qr-wrap">
      <div class="qr-box"><div id="qrcode"></div></div>
      <div class="qr-hint">Scan to save contact instantly</div>
      <button class="btn-download" onclick="downloadQR()">↓ Download QR PNG</button>
    </div>

    <div class="url-row">
      Scan with any phone → opens Contacts app directly.<br/>
      <span>If info changes, update this file and reprint the QR.</span>
    </div>

    <div class="panel-footer">
      <span class="footer-tag">Never expires</span>
      <span class="footer-dot"></span>
      <span class="footer-tag">iOS · Android</span>
    </div>
  </div>
</div>

<script>
const VCARD = "BEGIN:VCARD\nVERSION:3.0\nN:Alkassmy;Omar Manar;;;\nFN:Omar Manar Alkassmy\nORG:Syrian Saudi Business Council\nTITLE:Strategic Investment Lead\nTEL;TYPE=CELL:+963939442446\nEMAIL;TYPE=INTERNET:omar@sysabc.org\nEND:VCARD";

new QRCode(document.getElementById('qrcode'), {
  text: VCARD,
  width: 200,
  height: 200,
  colorDark: '#000000',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});

function downloadQR(){
  const canvas = document.querySelector('#qrcode canvas');
  if(!canvas) return;
  const a = Object.assign(document.createElement('a'), {
    download: 'omar-contact-qr.png',
    href: canvas.toDataURL('image/png')
  });
  a.click();
}
</script>
</body>
</html>
